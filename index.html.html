<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow • Modern Task Management</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { content: [] }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .task-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .task-card:hover { transform: translateY(-6px); }
    .kanban-column { min-height: 520px; }
  </style>
</head>
<body class="bg-gray-950 text-gray-200">

  <!-- Navbar -->
  <nav class="bg-gray-900/80 border-b border-gray-800 backdrop-blur-lg fixed w-full z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <i class="fas fa-tasks text-blue-500 text-3xl"></i>
        <h1 class="text-3xl font-bold tracking-tight">TaskFlow</h1>
      </div>
      <div class="flex items-center gap-6">
        <span id="user-name" class="text-sm font-medium px-4 py-2 bg-gray-800 rounded-2xl"></span>
        <button onclick="logout()" class="text-gray-400 hover:text-white transition">
          <i class="fas fa-sign-out-alt text-xl"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 pt-24 pb-12">
    <div class="flex justify-between items-end mb-10">
      <div>
        <h2 class="text-4xl font-semibold tracking-tight">My Tasks</h2>
        <p class="text-gray-400 mt-1">Stay productive • Track progress</p>
      </div>
      <button onclick="showNewTaskModal()" 
              class="bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded-3xl font-semibold flex items-center gap-3 transition">
        <i class="fas fa-plus"></i> New Task
      </button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
      <div class="bg-gray-900 border border-white/10 rounded-3xl p-6">
        <p class="text-gray-400 text-sm">Total</p>
        <p id="stat-total" class="text-5xl font-bold mt-3">0</p>
      </div>
      <div class="bg-gray-900 border border-white/10 rounded-3xl p-6">
        <p class="text-gray-400 text-sm">In Progress</p>
        <p id="stat-progress" class="text-5xl font-bold mt-3 text-yellow-400">0</p>
      </div>
      <div class="bg-gray-900 border border-white/10 rounded-3xl p-6">
        <p class="text-gray-400 text-sm">Completed</p>
        <p id="stat-done" class="text-5xl font-bold mt-3 text-emerald-400">0</p>
      </div>
      <div class="bg-gray-900 border border-white/10 rounded-3xl p-6">
        <p class="text-gray-400 text-sm">Overdue</p>
        <p id="stat-overdue" class="text-5xl font-bold mt-3 text-red-400">0</p>
      </div>
    </div>

    <!-- Kanban Board -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div class="bg-gray-900 border border-white/10 rounded-3xl p-6">
        <div class="flex justify-between mb-6">
          <h3 class="font-semibold flex items-center gap-3">
            <span class="w-3.5 h-3.5 bg-blue-500 rounded-full"></span> To Do
          </h3>
          <span id="todo-count" class="bg-gray-800 text-xs px-4 py-1 rounded-full">0</span>
        </div>
        <div id="todo-column" class="kanban-column space-y-4 min-h-[400px]"></div>
      </div>

      <div class="bg-gray-900 border border-white/10 rounded-3xl p-6">
        <div class="flex justify-between mb-6">
          <h3 class="font-semibold flex items-center gap-3">
            <span class="w-3.5 h-3.5 bg-yellow-500 rounded-full"></span> In Progress
          </h3>
          <span id="progress-count" class="bg-gray-800 text-xs px-4 py-1 rounded-full">0</span>
        </div>
        <div id="progress-column" class="kanban-column space-y-4 min-h-[400px]"></div>
      </div>

      <div class="bg-gray-900 border border-white/10 rounded-3xl p-6">
        <div class="flex justify-between mb-6">
          <h3 class="font-semibold flex items-center gap-3">
            <span class="w-3.5 h-3.5 bg-emerald-500 rounded-full"></span> Done
          </h3>
          <span id="done-count" class="bg-gray-800 text-xs px-4 py-1 rounded-full">0</span>
        </div>
        <div id="done-column" class="kanban-column space-y-4 min-h-[400px]"></div>
      </div>
    </div>
  </div>

  <!-- Task Modal -->
  <div id="task-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-gray-900 w-full max-w-md mx-4 rounded-3xl p-8">
      <h3 id="modal-title" class="text-2xl font-semibold mb-6">New Task</h3>
      <input id="task-id" type="hidden">
      
      <input id="task-title" type="text" placeholder="Task Title" 
             class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 mb-4 focus:border-blue-500 focus:outline-none">
      
      <textarea id="task-desc" placeholder="Description" rows="3" 
                class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 mb-6 focus:border-blue-500 focus:outline-none"></textarea>
      
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-xs text-gray-400 block mb-1">Status</label>
          <select id="task-status" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4">
            <option value="todo">To Do</option>
            <option value="progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-400 block mb-1">Due Date</label>
          <input id="task-due" type="date" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4">
        </div>
      </div>

      <div class="flex gap-4 mt-8">
        <button onclick="hideModal()" class="flex-1 py-4 border border-gray-600 rounded-2xl hover:bg-gray-800">Cancel</button>
        <button onclick="saveTask()" class="flex-1 py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl font-semibold">Save</button>
      </div>
    </div>
  </div>

  <script>
    // Initialize tasks first
    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

    function renderTasks() {
      const columns = {
        todo: document.getElementById('todo-column'),
        progress: document.getElementById('progress-column'),
        done: document.getElementById('done-column')
      };

      Object.values(columns).forEach(col => col.innerHTML = '');

      let counts = { todo: 0, progress: 0, done: 0 };

      tasks.forEach((task, index) => {
        const html = `
          <div class="task-card bg-gray-800 border border-gray-700 rounded-3xl p-6 cursor-grab" draggable="true" ondragstart="dragStart(event, ${index})">
            <div class="flex justify-between items-start">
              <h4 class="font-semibold">${task.title}</h4>
              <div class="flex gap-3">
                <i onclick="editTask(${index}); event.stopImmediatePropagation()" class="fas fa-edit text-gray-400 hover:text-blue-400 cursor-pointer"></i>
                <i onclick="deleteTask(${index}); event.stopImmediatePropagation()" class="fas fa-trash text-gray-400 hover:text-red-400 cursor-pointer"></i>
              </div>
            </div>
            ${task.description ? `<p class="mt-3 text-sm text-gray-400">${task.description}</p>` : ''}
            <div class="mt-6 text-xs flex justify-between">
              <span class="${task.status === 'done' ? 'text-emerald-400' : task.status === 'progress' ? 'text-yellow-400' : 'text-blue-400'}">
                ${task.status === 'todo' ? 'To Do' : task.status === 'progress' ? 'In Progress' : 'Done'}
              </span>
              ${task.dueDate ? `<span class="text-gray-500">${task.dueDate}</span>` : ''}
            </div>
          </div>
        `;

        columns[task.status].innerHTML += html;
        counts[task.status]++;
      });

      // Update stats
      document.getElementById('todo-count').textContent = counts.todo;
      document.getElementById('progress-count').textContent = counts.progress;
      document.getElementById('done-count').textContent = counts.done;
      document.getElementById('stat-total').textContent = tasks.length;
      document.getElementById('stat-progress').textContent = counts.progress;
      document.getElementById('stat-done').textContent = counts.done;
      document.getElementById('user-name').textContent = "Sivanadh Akurathi";
    }

    function showNewTaskModal() {
      document.getElementById('task-modal').classList.remove('hidden');
      document.getElementById('modal-title').textContent = 'New Task';
      document.getElementById('task-id').value = '';
      document.getElementById('task-title').value = '';
      document.getElementById('task-desc').value = '';
      document.getElementById('task-status').value = 'todo';
      document.getElementById('task-due').value = '';
    }

    function hideModal() {
      document.getElementById('task-modal').classList.add('hidden');
    }

    function saveTask() {
      const id = document.getElementById('task-id').value;
      const title = document.getElementById('task-title').value.trim();
      if (!title) return alert("Please enter a task title");

      const newTask = {
        title: title,
        description: document.getElementById('task-desc').value.trim(),
        status: document.getElementById('task-status').value,
        dueDate: document.getElementById('task-due').value
      };

      if (id) {
        const task = tasks.find(t => t.id == id);
        if (task) Object.assign(task, newTask);
      } else {
        newTask.id = Date.now();
        tasks.push(newTask);
      }

      localStorage.setItem('tasks', JSON.stringify(tasks));
      hideModal();
      renderTasks();
    }

    function editTask(index) {
      const task = tasks[index];
      document.getElementById('task-id').value = task.id;
      document.getElementById('task-title').value = task.title;
      document.getElementById('task-desc').value = task.description || '';
      document.getElementById('task-status').value = task.status;
      document.getElementById('task-due').value = task.dueDate || '';
      document.getElementById('modal-title').textContent = 'Edit Task';
      document.getElementById('task-modal').classList.remove('hidden');
    }

    function deleteTask(index) {
      if (confirm("Delete this task?")) {
        tasks.splice(index, 1);
        localStorage.setItem('tasks', JSON.stringify(tasks));
        renderTasks();
      }
    }

    function dragStart(e, index) {
      e.dataTransfer.setData("text/plain", index);
    }

    // Setup drag and drop
    function setupDragAndDrop() {
      document.querySelectorAll('.kanban-column').forEach(column => {
        column.addEventListener('dragover', e => e.preventDefault());
        column.addEventListener('drop', e => {
          e.preventDefault();
          const index = parseInt(e.dataTransfer.getData("text/plain"));
          const newStatus = column.id.replace('-column', '');
          if (tasks[index]) {
            tasks[index].status = newStatus;
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
          }
        });
      });
    }

    function logout() {
      if (confirm("Logout?")) location.reload();
    }

    // Load demo data if empty
    if (tasks.length === 0) {
      tasks = [
        { id: 1, title: "Build Portfolio Website", description: "Modern dark theme", status: "todo", dueDate: "2026-06-25" },
        { id: 2, title: "AI Legal Assistant", description: "Implement RAG", status: "progress", dueDate: "2026-06-22" },
        { id: 3, title: "Finish Cisco Python", description: "", status: "done", dueDate: "2026-06-18" }
      ];
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    // Initialize everything
    window.onload = function() {
      setupDragAndDrop();
      renderTasks();
    };
  </script>
</body>
</html>
